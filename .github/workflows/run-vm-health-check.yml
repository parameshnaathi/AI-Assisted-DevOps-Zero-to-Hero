name: Run VM Health Check on AWS EC2

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "Target EC2 Instance ID"
        required: true
        default: "i-xxxxxxxxxxxxxxxxx"

jobs:
  run-vm-health-check:
    name: Execute VM Health Monitor via AWS SSM
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Execute Health Check on EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ github.event.inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Executing VM health monitor from GitHub Actions" \
            --parameters 'commands=[
              "set -e",
              "echo Starting VM Health Check",
              "cd /tmp",
              "rm -rf vm-health-monitor",
              "git clone https://github.com/${{ github.repository }}.git",
              "cd vm-health-monitor",
              "chmod +x scripts/health_check.sh",
              "if ! command -v bc >/dev/null 2>&1; then sudo yum install -y bc || sudo apt-get update && sudo apt-get install -y bc; fi",
              "./scripts/health_check.sh explain"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for SSM Command Completion
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ github.event.inputs.instance_id }}" \
              --query "Status" \
              --output text || echo "Pending")

            echo "Current Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              exit 1
            fi

            sleep 10
          done

          exit 1

      - name: Print VM Health Check Output
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Print VM Health Check Errors
        if: always() && env.COMMAND_ID != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --query "StandardErrorContent" \
            --output text || true