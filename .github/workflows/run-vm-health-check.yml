name: Run VM Health Check on AWS EC2

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "Target EC2 Instance ID"
        required: true
        default: "i-xxxxxxxxxxxxxxxxx"

jobs:
  run-vm-health-check:
    name: Execute VM Health Monitor via AWS SSM
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Execute Health Check on EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ github.event.inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Executing VM health monitor from GitHub Actions" \
            --parameters 'commands=[
              "set -e",
              "echo Starting VM Health Check",
              "echo Checking EC2 OS details",
              "cat /etc/os-release || true",
              "echo Installing required packages: git and bc",
              "if command -v dnf >/dev/null 2>&1; then sudo dnf install -y git bc; elif command -v yum >/dev/null 2>&1; then sudo yum install -y git bc; elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y git bc; else echo Unsupported package manager; exit 1; fi",
              "git --version",
              "cd /tmp",
              "rm -rf ai-devops-repo",
              "git clone https://github.com/parameshnaathi/AI-Assisted-DevOps-Zero-to-Hero.git ai-devops-repo",
              "cd ai-devops-repo",
              "echo Current directory: $(pwd)",
              "echo Searching for health_check.sh file",
              "find . -type f -name health_check.sh -print",
              "SCRIPT_PATH=$(find . -type f -name health_check.sh | head -n 1)",
              "echo Selected script path: $SCRIPT_PATH",
              "test -n \"$SCRIPT_PATH\" || { echo health_check.sh not found in repository; exit 1; }",
              "sed -i '\''s/\\r$//'\'' \"$SCRIPT_PATH\"",
              "chmod +x \"$SCRIPT_PATH\"",
              "echo Executing health check script",
              "bash \"$SCRIPT_PATH\" explain"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for SSM Command Completion
        if: env.COMMAND_ID != ''
        run: |
          FINAL_STATUS="Unknown"

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ github.event.inputs.instance_id }}" \
              --query "Status" \
              --output text || echo "Pending")

            echo "Current Status: $STATUS"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              FINAL_STATUS="$STATUS"
              break
            fi

            sleep 10
          done

          echo "SSM_STATUS=$FINAL_STATUS" >> "$GITHUB_ENV"
          echo "Final SSM Status: $FINAL_STATUS"

      - name: Print VM Health Check Output
        if: always() && env.COMMAND_ID != ''
        run: |
          echo "Fetching SSM standard output..."

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --query "StandardOutputContent" \
            --output text || true

      - name: Print VM Health Check Errors
        if: always() && env.COMMAND_ID != ''
        run: |
          echo "Fetching SSM standard error..."

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ github.event.inputs.instance_id }}" \
            --query "StandardErrorContent" \
            --output text || true

      - name: Fail if SSM Command Failed
        if: always() && env.SSM_STATUS != 'Success'
        run: |
          echo "SSM command ended with status: $SSM_STATUS"
          exit 1